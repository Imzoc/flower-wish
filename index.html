<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mixed Flower Birthday Wish</title>
    <style>
        /* Base Reset */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #080a13; /* Deep magical night sky */
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .scene {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 1s ease-in-out;
        }

        /* Starry Background */
        .stars {
            position: absolute;
            width: 100%; height: 100%;
            background-image: 
                radial-gradient(2px 2px at 20px 30px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 50px 160px, rgba(255,255,255,0.8), rgba(0,0,0,0)),
                radial-gradient(3px 3px at 90px 40px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 160px 120px, rgba(255,255,255,0.6), rgba(0,0,0,0));
            background-repeat: repeat;
            background-size: 250px 250px;
            z-index: -2;
            animation: twinkle 4s infinite alternate;
        }

        /* Floating Glowing Hearts from Video */
        .floating-heart {
            position: absolute;
            width: 30px; height: 30px;
            background: transparent;
            border: 2px solid rgba(255, 117, 140, 0.6);
            transform: rotate(45deg);
            box-shadow: 0 0 15px rgba(255, 117, 140, 0.5);
            animation: floatUp 8s infinite linear;
            z-index: -1;
            opacity: 0;
        }
        .floating-heart::before, .floating-heart::after {
            content: '';
            position: absolute;
            width: 30px; height: 30px;
            border: 2px solid rgba(255, 117, 140, 0.6);
            border-radius: 50%;
            background: transparent;
            box-shadow: 0 0 15px rgba(255, 117, 140, 0.5);
        }
        .floating-heart::before { top: -15px; left: -2px; border-bottom: none; border-right: none; }
        .floating-heart::after { top: -2px; left: -15px; border-right: none; border-top: none; }

        .h1 { bottom: -10%; left: 20%; animation-delay: 0s; transform: rotate(45deg) scale(0.6); }
        .h2 { bottom: -10%; left: 70%; animation-delay: 3s; transform: rotate(45deg) scale(1.2); }
        .h3 { bottom: -10%; left: 40%; animation-delay: 1.5s; transform: rotate(45deg) scale(0.8); }

        /* --- THE MIXED BOUQUET (Organically Layered like Video) --- */
        .bouquet {
            position: relative;
            width: 300px;
            height: 380px; /* Taller for more flowers */
            display: flex;
            justify-content: center;
            align-items: flex-end;
            margin-top: 30px;
        }

        /* Curved Grass/Leaves (Preserved complexity) */
        .leaf {
            position: absolute; bottom: 0;
            width: 15px; background: #1e5e33;
            border-radius: 50% 50% 0 0;
            transform-origin: bottom center;
            height: 0; animation: growLeaf 2.2s ease-in-out forwards;
        }
        .leaf-1 { left: 80px; transform: rotate(-35deg); animation-delay: 0.1s; }
        .leaf-2 { right: 80px; transform: rotate(35deg); animation-delay: 0.3s; }
        .leaf-3 { left: 110px; transform: rotate(-18deg); width: 10px; background: #267a42; animation-delay: 0.2s; }
        .leaf-4 { right: 110px; transform: rotate(18deg); width: 10px; background: #267a42; animation-delay: 0.4s; }
        .leaf-5 { left: 60px; transform: rotate(-48deg); animation-delay: 0.5s; }
        .leaf-6 { right: 60px; transform: rotate(48deg); animation-delay: 0.6s; }

        /* Stems */
        .stem {
            position: absolute; bottom: 0;
            width: 6px; background: linear-gradient(to top, #144021, #288c4a);
            border-radius: 3px;
            transform-origin: bottom center;
            height: 0; animation: growStem 2.5s ease-in-out forwards;
        }
        .stem-pos-1 { left: 147px; height: 230px; animation-delay: 0.2s; } /* Center Rose */
        .stem-pos-2 { left: 100px; height: 160px; transform: rotate(-25deg); animation-delay: 0.4s; } /* Left Rose */
        .stem-pos-3 { right: 100px; height: 180px; transform: rotate(25deg); animation-delay: 0.6s; } /* Right Rose */
        .stem-pos-4 { left: 60px; height: 110px; transform: rotate(-35deg); animation-delay: 0.8s; } /* Lower Left Tulip */
        .stem-pos-5 { right: 60px; height: 130px; transform: rotate(35deg); animation-delay: 1s; } /* Lower Right Tulip */
        .stem-pos-6 { left: 120px; height: 200px; transform: rotate(-15deg); animation-delay: 1.2s; } /* Upper Left Tulip */
        .stem-pos-7 { right: 120px; height: 210px; transform: rotate(15deg); animation-delay: 1.4s; } /* Upper Right Tulip */

        /* --- FLOWER HEADS --- */
        .bloom {
            position: absolute;
            width: 65px; height: 65px;
            transform: scale(0);
            z-index: 10;
        }

        /* Crimson Red Roses */
        .rose .petal-rose {
            position: absolute;
            width: 25px; height: 50px;
            background: linear-gradient(to bottom, #d32f2f, #b71c1c);
            border-radius: 50% 50% 15% 15%;
            top: 5px; left: 20px;
            transform-origin: bottom center;
            box-shadow: 0 0 15px rgba(211, 47, 47, 0.7);
        }
        /* Many Layered Petals for Rose (Organic opening) */
        .rose .petal-rose:nth-child(1) { transform: rotate(0deg) scaleY(1.1); }
        .rose .petal-rose:nth-child(2) { transform: rotate(25deg); animation-delay: 2.2s; }
        .rose .petal-rose:nth-child(3) { transform: rotate(50deg); animation-delay: 2.3s;}
        .rose .petal-rose:nth-child(4) { transform: rotate(75deg); animation-delay: 2.4s;}
        .rose .petal-rose:nth-child(5) { transform: rotate(100deg); animation-delay: 2.5s;}
        .rose .petal-rose:nth-child(6) { transform: rotate(125deg); animation-delay: 2.6s;}
        .rose .petal-rose:nth-child(7) { transform: rotate(150deg); animation-delay: 2.7s;}
        .rose .petal-rose:nth-child(8) { transform: rotate(175deg); animation-delay: 2.8s;}
        .rose .petal-rose:nth-child(9) { transform: rotate(200deg); animation-delay: 2.9s;}
        .rose .petal-rose:nth-child(10) { transform: rotate(225deg); animation-delay: 3s;}
        .rose .petal-rose:nth-child(11) { transform: rotate(250deg); animation-delay: 3.1s;}
        .rose .petal-rose:nth-child(12) { transform: rotate(275deg); animation-delay: 3.2s;}
        .rose .petal-rose:nth-child(13) { transform: rotate(300deg); animation-delay: 3.3s;}
        .rose .petal-rose:nth-child(14) { transform: rotate(325deg); animation-delay: 3.4s;}
        .rose .petal-rose:nth-child(15) { transform: rotate(350deg); animation-delay: 3.5s;}
        .rose .petal-rose:nth-child(16) { transform: rotate(0deg) scale(0.6); filter: brightness(1.2); animation-delay: 3.6s; z-index: 5;} /* Deep Core */

        /* Distinct Tulips */
        .tulip .petal-tulip {
            position: absolute;
            width: 25px; height: 55px;
            border-radius: 50% 50% 20% 20%;
            top: 0; left: 20px;
            transform-origin: bottom center;
            box-shadow: 0 0 10px rgba(255, 117, 140, 0.5);
        }
        .tulip-pink .petal-tulip { background: linear-gradient(to bottom, #ff7eb3, #ff758c); }
        .tulip-yellow .petal-tulip { background: linear-gradient(to bottom, #ffdf00, #ff9a9e); } /* Yellow/Red streak */

        /* 6 Cup Petals for Tulip */
        .tulip .petal-tulip:nth-child(1) { transform: rotate(0deg); }
        .tulip .petal-tulip:nth-child(2) { transform: rotate(60deg); }
        .tulip .petal-tulip:nth-child(3) { transform: rotate(120deg); }
        .tulip .petal-tulip:nth-child(4) { transform: rotate(180deg); }
        .tulip .petal-tulip:nth-child(5) { transform: rotate(240deg); }
        .tulip .petal-tulip:nth-child(6) { transform: rotate(300deg); }
        .tulip .flower-core-tulip {
            position: absolute; width: 14px; height: 14px;
            background: #ffdf00; border-radius: 50%;
            top: 38px; left: 25px; box-shadow: 0 0 15px #ffdf00; z-index: 5;
        }

        /* --- FLOWER POSITIONS --- */
        .pos-center { bottom: 200px; left: 120px; animation: bloomAnim 2s cubic-bezier(0.175, 0.885, 0.32, 1.275) 2.2s forwards; }
        .pos-left { bottom: 120px; left: 55px; animation: bloomAnim 2s cubic-bezier(0.175, 0.885, 0.32, 1.275) 2.8s forwards; }
        .pos-right { bottom: 140px; right: 55px; animation: bloomAnim 2s cubic-bezier(0.175, 0.885, 0.32, 1.275) 3.4s forwards; }
        
        .pos-tulip-1 { bottom: 70px; left: 20px; animation: bloomAnim Tulip 2s ease-in-out 4s forwards; }
        .pos-tulip-2 { bottom: 90px; right: 20px; animation: bloomAnim Tulip 2s ease-in-out 4.4s forwards; }
        .pos-tulip-3 { bottom: 170px; left: 80px; animation: bloomAnim Tulip 2s ease-in-out 4.8s forwards; }
        .pos-tulip-4 { bottom: 180px; right: 80px; animation: bloomAnim Tulip 2s ease-in-out 5.2s forwards; }

        /* Greeting & Button (Text updated as per your specific request) */
        .greeting-container {
            margin-top: 30px;
            text-align: center;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeUp 1.5s ease-out 6.5s forwards; /* Waits for all flowers */
        }

        .greeting-container h1 {
            font-size: 1.8rem;
            letter-spacing: 1.5px;
            color: #ffb7b2;
            text-shadow: 0 0 15px rgba(255, 183, 178, 0.8);
            margin-bottom: 25px;
            max-width: 600px;
            padding: 0 20px;
            line-height: 1.4;
        }

        button {
            background: rgba(255, 183, 178, 0.1);
            color: #ffb7b2;
            border: 2px solid #ffb7b2;
            padding: 12px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(255, 183, 178, 0.4);
            letter-spacing: 1px;
        }

        button:hover {
            background: #ffb7b2;
            color: #080a13;
            box-shadow: 0 0 25px rgba(255, 183, 178, 0.9);
            transform: scale(1.05);
        }

        /* --- SCENE 2: CAKE & WISH (Hidden Initially) --- */
        #scene2 { display: none; opacity: 0; }
        
        .card {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 25px;
            padding: 50px 40px;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6), inset 0 0 20px rgba(255,183,178,0.1);
        }

        /* Cake Styling (Pink to match theme) */
        .cake {
            position: relative;
            width: 150px; height: 120px;
            margin: 0 auto 40px auto;
        }
        .tier {
            position: absolute;
            background: #ff9a9e; 
            border-radius: 10px;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: inset 0 -5px 15px rgba(0,0,0,0.2);
        }
        .tier-bottom { width: 140px; height: 50px; bottom: 0; background: #e06c75; }
        .tier-middle { width: 100px; height: 40px; bottom: 50px; background: #ff758c; }
        .tier-top { width: 60px; height: 30px; bottom: 90px; background: #ff9a9e; }
        .candle {
            position: absolute;
            width: 8px; height: 30px;
            background: #fff;
            bottom: 120px; left: 50%;
            transform: translateX(-50%);
            border-radius: 4px;
        }
        .flame {
            position: absolute;
            width: 14px; height: 22px;
            background: #ffdf00;
            border-radius: 50% 50% 20% 20%;
            bottom: 150px; left: 50%;
            transform: translateX(-50%);
            box-shadow: 0 0 20px #ffdf00, 0 0 40px #ff9f43;
            animation: flicker 0.5s infinite alternate;
        }

        .wish-text p {
            font-size: 1.15rem;
            line-height: 1.8;
            color: #f1f1f1;
            font-style: italic;
        }

        /* --- ANIMATIONS KEYFRAMES --- */
        @keyframes floatUp {
            0% { bottom: -10%; opacity: 0; }
            20% { opacity: 0.8; }
            80% { opacity: 0.8; }
            100% { bottom: 110%; opacity: 0; }
        }
        @keyframes growStem { to { height: 100%; } } /* Fills its set height */
        @keyframes growLeaf { to { height: 180px; } }
        @keyframes bloomAnim { to { transform: scale(1); } }
        @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
        @keyframes twinkle { 0% { opacity: 0.5; } 100% { opacity: 1; } }
        @keyframes flicker { 0% { transform: translateX(-50%) scale(1); opacity: 0.8; } 100% { transform: translateX(-50%) scale(1.15); opacity: 1; } }

    </style>
</head>
<body>

    <div class="stars"></div>
    <div class="floating-heart h1"></div>
    <div class="floating-heart h2"></div>
    <div class="floating-heart h3"></div>

    <div id="scene1" class="scene">
        <div class="bouquet">
            <div class="stem stem-pos-1"></div> <div class="stem stem-pos-2"></div> <div class="stem stem-pos-3"></div> <div class="stem stem-pos-4"></div> <div class="stem stem-pos-5"></div> <div class="stem stem-pos-6"></div> <div class="stem stem-pos-7"></div> <div class="bloom rose pos-center">
                <div class="petal-rose"></div><div class="petal-rose"></div><div class="petal-rose"></div><div class="petal-rose"></div>
                <div class="petal-rose"></div><div class="petal-rose"></div><div class="petal-rose"></div><div class="petal-rose"></div>
                <div class="petal-rose"></div><div class="petal-rose"></div><div class="petal-rose"></div><div class="petal-rose"></div>
                <div class="petal-rose"></div><div class="petal-rose"></div><div class="petal-rose"></div><div class="petal-rose"></div>
            </div>

            <div class="bloom rose pos-left">
                <div class="petal-rose"></div><div class="petal-rose"></div><div class="petal-rose"></div><div class="petal-rose"></div>
                <div class="petal-rose"></div><div class="petal-rose"></div><div class="petal-rose"></div><div class="petal-rose"></div>
                <div class="petal-rose"></div><div class="petal-rose"></div><div class="petal-rose"></div><div class="petal-rose"></div>
                <div class="petal-rose"></div><div class="petal-rose"></div><div class="petal-rose"></div><div class="petal-rose"></div>
            </div>

            <div class="bloom rose pos-right">
                <div class="petal-rose"></div><div class="petal-rose"></div><div class="petal-rose"></div><div class="petal-rose"></div>
                <div class="petal-rose"></div><div class="petal-rose"></div><div class="petal-rose"></div><div class="petal-rose"></div>
                <div class="petal-rose"></div><div class="petal-rose"></div><div class="petal-rose"></div><div class="petal-rose"></div>
                <div class="petal-rose"></div><div class="petal-rose"></div><div class="petal-rose"></div><div class="petal-rose"></div>
            </div>

            <div class="bloom tulip tulip-pink pos-tulip-1">
                <div class="petal-tulip"></div><div class="petal-tulip"></div><div class="petal-tulip"></div>
                <div class="petal-tulip"></div><div class="petal-tulip"></div><div class="petal-tulip"></div>
                <div class="flower-core-tulip"></div>
            </div>

            <div class="bloom tulip tulip-yellow pos-tulip-2">
                <div class="petal-tulip"></div><div class="petal-tulip"></div><div class="petal-tulip"></div>
                <div class="petal-tulip"></div><div class="petal-tulip"></div><div class="petal-tulip"></div>
                <div class="flower-core-tulip"></div>
            </div>

            <div class="bloom tulip tulip-pink pos-tulip-3">
                <div class="petal-tulip"></div><div class="petal-tulip"></div><div class="petal-tulip"></div>
                <div class="petal-tulip"></div><div class="petal-tulip"></div><div class="petal-tulip"></div>
                <div class="flower-core-tulip"></div>
            </div>

            <div class="bloom tulip tulip-yellow pos-tulip-4">
                <div class="petal-tulip"></div><div class="petal-tulip"></div><div class="petal-tulip"></div>
                <div class="petal-tulip"></div><div class="petal-tulip"></div><div class="petal-tulip"></div>
                <div class="flower-core-tulip"></div>
            </div>

            <div class="leaf leaf-1"></div>
            <div class="leaf leaf-2"></div>
            <div class="leaf leaf-3"></div>
            <div class="leaf leaf-4"></div>
            <div class="leaf leaf-5"></div>
            <div class="leaf leaf-6"></div>
        </div>

        <div class="greeting-container">
            <h1>HAPPY BIRTHDAY YOUNG LADY NUR AINA BATRISYIA</h1>
            <button id="openCardBtn">Read My Wish</button>
        </div>
    </div>

    <div id="scene2" class="scene">
        <div class="card">
            <div class="cake">
                <div class="flame"></div>
                <div class="candle"></div>
                <div class="tier tier-top"></div>
                <div class="tier tier-middle"></div>
                <div class="tier tier-bottom"></div>
            </div>
            <div class="wish-text">
                <p>
                    "Happy Birthday! May this mixed bouquet bring as much color, warmth, and joy into your life as you bring into the world. Wishing you endless happiness today and always."
                </p>
            </div>
        </div>
    </div>

    <script>
        const btn = document.getElementById('openCardBtn');
        const scene1 = document.getElementById('scene1');
        const scene2 = document.getElementById('scene2');

        btn.addEventListener('click', () => {
            scene1.style.opacity = '0';
            setTimeout(() => {
                scene1.style.display = 'none';
                scene2.style.display = 'flex';
                void scene2.offsetWidth; 
                scene2.style.opacity = '1';
            }, 1000); 
        });
    </script>
</body>
</html>
